[package]
name = "rtv"

description = "Rtv is a crate for recursively traversing a directory using a simple API. In other words: You can easily iterate over the files inside a directory tree."
keywords = ["directory", "file", "traverse", "recursive", "iterate"]
categories = ["filesystem", "algorithms"]
repository = "https://github.com/Foxcirc/rtv"
documentation = "https://docs.rs/rtv"
readme = "README.md"

authors = ["foxcirc"]
version = "1.0.0"
edition = "2018"

license = "MIT"